<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSAP MotionPath Zigzag - Scroll Demo</title>
  <style>
    body {
      background-image: linear-gradient(
          rgba(255, 255, 255, 0.05) 2px,
          transparent 2px
        ),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 2px, transparent 2px),
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
      background-position: -2px -2px, -2px -2px, -1px -1px, -1px -1px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .section {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      font-weight: bold;
      position: relative;
    }

    /* First section - no animation */
    .section-first {
      background: rgba(0, 0, 0, 0.02);
    }

    /* Middle sections - animation runs here */
    .sections-with-animation {
      position: relative;
      height: 300vh;
    }

    .container {
      position: absolute;
      width: 140px;
      height: 140px;
      border: 2px dashed rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Start point - center of first animated section */
    .initial {
      left: 50%;
      top: 8%;
      transform: translate(-50%, -50%);
    }

    /* Zigzag markers - alternating left/right */
    .marker-left { left: 25%; transform: translate(-50%, -50%); }
    .marker-right { left: 75%; transform: translate(-50%, -50%); }

    .marker-1 { top: 25%; }
    .marker-2 { top: 42%; }
    .marker-3 { top: 58%; }
    .marker-4 { top: 75%; }
    .marker-5 { top: 92%; }

    .marker {
      width: 100px;
      height: 100px;
      border-radius: 10px;
    }

    .box {
      width: 100px;
      height: 100px;
      z-index: 10;
      border-radius: 10px;
      background-image: url("https://assets.codepen.io/16327/flair-26.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-color: transparent;
    }

    /* Footer - no animation */
    .section-footer {
      background: rgba(0, 0, 0, 0.02);
    }
  </style>
</head>
<body>
  <!-- First section - no animation -->
  <section class="section section-first">First section — scroll down</section>

  <!-- Middle sections - zigzag animation runs here only -->
  <div class="sections-with-animation">
    <div class="container initial">
      <div class="box"></div>
    </div>
    <div class="container marker-left marker-1"><div class="marker"></div></div>
    <div class="container marker-right marker-2"><div class="marker"></div></div>
    <div class="container marker-left marker-3"><div class="marker"></div></div>
    <div class="container marker-right marker-4"><div class="marker"></div></div>
    <div class="container marker-left marker-5"><div class="marker"></div></div>
  </div>

  <!-- Footer - no animation -->
  <section class="section section-footer">Footer — scroll up</section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/gsap@3/dist/MotionPathPlugin.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger, MotionPathPlugin);

    let ctx;

    function createTimeline() {
      ctx && ctx.revert();

      ctx = gsap.context(() => {
        const box = document.querySelector(".box");
        const boxStartRect = box.getBoundingClientRect();

        const containers = gsap.utils.toArray(".container:not(.initial)");

        const points = containers.map((container) => {
          const marker = container.querySelector(".marker") || container;
          const r = marker.getBoundingClientRect();

          return {
            x: r.left + r.width / 2 - (boxStartRect.left + boxStartRect.width / 2),
            y: r.top + r.height / 2 - (boxStartRect.top + boxStartRect.height / 2)
          };
        });

        // Build path with "stay" segments - left, right, left, right, left
        const pathWithStays = [];
        let prev = { x: 0, y: 0 };

        for (let i = 0; i < points.length; i++) {
          const curr = points[i];
          for (let j = 1; j <= 4; j++) {
            const t = j / 4;
            pathWithStays.push({
              x: prev.x + (curr.x - prev.x) * t,
              y: prev.y + (curr.y - prev.y) * t
            });
          }
          pathWithStays.push({ ...curr });
          for (let k = 0; k < 6; k++) {
            pathWithStays.push({ ...curr });
          }
          prev = curr;
        }

        const tl = gsap.timeline({
          scrollTrigger: {
            trigger: ".sections-with-animation",
            start: "top center",
            endTrigger: ".section-footer",
            end: "top center",
            scrub: 0.5,
            invalidateOnRefresh: true
          }
        });

        tl.to(".box", {
          duration: 1,
          ease: "none",
          motionPath: {
            path: pathWithStays,
            curviness: 0
          }
        });
      });
    }

    createTimeline();
    window.addEventListener("resize", createTimeline);
  </script>
</body>
</html>
